# Supabase project config used by the `supabase` CLI.
#
# Apply with:
#   cd packages/api-server
#   supabase link --project-ref <your-project-ref>
#   supabase config push
#   supabase db push      # applies ./migrations
#   supabase db seed      # applies ./seed.sql
#
# The values below are the subset rmf-web cares about. Anything not listed
# uses the Supabase default. Everything here is supported on the free tier.

project_id = "rmf-web"

[api]
enabled = true
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# `site_url` is the canonical URL the dashboard is served from. Override per
# environment via `SUPABASE_AUTH_SITE_URL` when running `supabase config push`.
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # disabled for the demo so users can log in immediately
secure_password_change = false
max_frequency = "1s"

# Add OAuth providers here if you want them. All supported on the free tier.
# [auth.external.github]
# enabled = true
# client_id = "env(SUPABASE_AUTH_GITHUB_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_GITHUB_SECRET)"
# redirect_uri = "https://<project-ref>.supabase.co/auth/v1/callback"

# Custom access-token hook so JWTs carry app_metadata.roles. The api-server's
# authenticator promotes users with role "superuser" to admin on first login.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/rmf_access_token_hook"

[realtime]
enabled = false  # rmf-web does not use Supabase Realtime; api-server handles its own socket.io

[storage]
enabled = false  # not used by rmf-web
